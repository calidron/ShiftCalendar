<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#02040f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ShiftCalendar" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" sizes="180x180" />
    <link rel="icon" href="icons/icon-192.png" sizes="192x192" />
    <link rel="stylesheet" href="css/app.css" />
    <title>ShiftCalendar</title>
  </head>
  <body>
    <div class="app-shell">
      <main id="panel-calendar" class="panel active"></main>
      <main id="panel-summary" class="panel"></main>
      <main id="panel-settings" class="panel"></main>
    </div>

    <nav class="tabbar" aria-label="Main">
      <button class="tab-btn active" data-tab="calendar" type="button" aria-label="Calendar">
        <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2"></rect>
          <line x1="3" y1="10" x2="21" y2="10"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="16" y1="2" x2="16" y2="6"></line>
        </svg>
        <span>Calendar</span>
      </button>
      <button class="tab-btn" data-tab="summary" type="button" aria-label="Summary">
        <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 4h12v16H6z"></path>
          <line x1="9" y1="8" x2="15" y2="8"></line>
          <line x1="9" y1="12" x2="15" y2="12"></line>
          <line x1="9" y1="16" x2="13" y2="16"></line>
          <rect x="4" y="6" width="3" height="12" rx="0.5"></rect>
        </svg>
        <span>Summary</span>
      </button>
      <button class="tab-btn" data-tab="settings" type="button" aria-label="Settings">
        <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"></path>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.26.604.852.997 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
        <span>Settings</span>
      </button>
    </nav>

    <div id="modal-root"></div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
